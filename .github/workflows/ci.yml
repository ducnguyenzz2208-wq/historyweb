name: CI — kiểm tra liên kết

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Kiểm tra liên kết nội bộ
        run: node scripts/check-links.mjs
      - name: Dựng lại sitemap/RSS (kiểm tra script chạy được)
        run: node scripts/build-feeds.mjs && node scripts/prerender.mjs
