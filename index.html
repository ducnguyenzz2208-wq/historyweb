<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dòng Chảy Lịch Sử — Blog lịch sử</title>
  <meta name="description" content="Blog lịch sử song ngữ Việt–Anh: kể lại quá khứ qua hình ảnh, tư liệu và cảm xúc.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Cinzel:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232b0d12'/><text x='50' y='72' font-family='Georgia' font-size='64' font-weight='700' fill='%23c9a227' text-anchor='middle'>H</text></svg>">
</head>
<body data-page="home">
  <div class="page-loader" id="pageLoader"><div class="page-loader__word"><span>HISTORY</span></div></div>
  <div id="header-slot"></div>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="hero__bg" data-parallax>
        <img src="https://images.unsplash.com/photo-1461360370896-922624d12aa1?auto=format&fit=crop&w=2000&q=80" alt="">
      </div>
      <div class="aurora" aria-hidden="true">
        <span class="aurora__blob aurora__blob--1"></span>
        <span class="aurora__blob aurora__blob--2"></span>
        <span class="aurora__blob aurora__blob--3"></span>
      </div>
      <div class="wrap hero__inner">
        <span class="kicker hero__kicker" data-i18n="hero.kicker"></span>
        <h1 class="hero__title" data-split data-i18n="hero.title">HISTORY</h1>
        <p class="hero__subtitle" data-i18n="hero.subtitle"></p>
        <div class="hero__actions">
          <a class="btn" href="blog.html"><span data-i18n="hero.cta"></span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </a>
          <a class="btn btn--ghost" href="#overview" data-i18n="hero.cta2"></a>
        </div>
      </div>
      <div class="hero__scroll"><span></span><small data-i18n="hero.scroll"></small></div>
    </section>

    <!-- OVERVIEW / GIỚI THIỆU TÓM TẮT -->
    <section class="section overview" id="overview">
      <div class="wrap">
        <div class="section-head center" style="margin-inline:auto" data-reveal>
          <span class="kicker" style="justify-content:center" data-i18n="intro.kicker"></span>
          <h2 style="font-size:clamp(2rem,5vw,3.4rem);margin-top:.6rem"><span data-site-name></span></h2>
        </div>
        <div class="overview__inner">
          <div class="overview__lead" data-reveal="up">
            <p class="drop" data-i18n="intro.lead"></p>
          </div>
          <div class="overview__stats" data-stagger>
            <div class="stat glass">
              <div class="stat__num" data-count="24" data-count-suffix="+"></div>
              <div class="stat__label" data-i18n="intro.stat1"></div>
            </div>
            <div class="stat glass">
              <div class="stat__num" data-count="6" data-count-suffix="+"></div>
              <div class="stat__label" data-i18n="intro.stat2"></div>
            </div>
            <div class="stat glass">
              <div class="stat__num" data-count="20" data-count-suffix="+"></div>
              <div class="stat__label" data-i18n="intro.stat3"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- BA NHÁNH KHÁM PHÁ -->
    <section class="section section--alt">
      <div class="wrap">
        <div class="section-head" data-reveal>
          <span class="kicker" data-i18n="intro.explore.kicker"></span>
          <h2 data-i18n="intro.explore.title"></h2>
          <p data-i18n="intro.explore.subtitle"></p>
        </div>
        <div class="pillars" data-stagger>
          <a class="pillar glass" href="blog.html?region=world" data-tilt>
            <span class="pillar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 010 18M12 3a15 15 0 000 18"/></svg></span>
            <h3 data-i18n="pillar.world.t"></h3>
            <p data-i18n="pillar.world.d"></p>
            <span class="pillar__link"><span data-i18n="pillar.cta"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
          </a>
          <a class="pillar glass" href="blog.html?region=vietnam" data-tilt>
            <span class="pillar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M5 3v18M5 4h11l-2 3 2 3H5"/><circle cx="5" cy="21" r="1"/></svg></span>
            <h3 data-i18n="pillar.vn.t"></h3>
            <p data-i18n="pillar.vn.d"></p>
            <span class="pillar__link"><span data-i18n="pillar.cta"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
          </a>
          <a class="pillar glass" href="figures.html" data-tilt>
            <span class="pillar__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></svg></span>
            <h3 data-i18n="pillar.figures.t"></h3>
            <p data-i18n="pillar.figures.d"></p>
            <span class="pillar__link"><span data-i18n="pillar.cta"></span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
          </a>
        </div>
      </div>
    </section>

    <!-- TIMELINE -->
    <section class="section" id="timeline">
      <div class="wrap">
        <div class="section-head" data-reveal>
          <span class="kicker" data-i18n="timeline.kicker"></span>
          <h2 data-i18n="timeline.title"></h2>
          <p data-i18n="timeline.subtitle"></p>
        </div>
        <div class="timeline">
          <div class="timeline__track" id="timelineTrack"></div>
        </div>
      </div>
    </section>

    <!-- FEATURED -->
    <section class="section section--alt">
      <div class="wrap">
        <div id="featuredSlot" data-reveal></div>
      </div>
    </section>

    <!-- LATEST -->
    <section class="section">
      <div class="wrap">
        <div class="section-head" data-reveal>
          <span class="kicker" data-i18n="latest.kicker"></span>
          <h2 data-i18n="latest.title"></h2>
          <p data-i18n="latest.subtitle"></p>
        </div>
        <div class="grid" id="latestGrid"></div>
        <div class="center mt-2" data-reveal>
          <a class="btn btn--ghost" href="blog.html" data-i18n="latest.all"></a>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="config.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/md.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>
